<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant Demo - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full p-10 bg-white shadow-2xl rounded-[3rem] border border-slate-100 text-center">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-600 rounded-[2rem] shadow-xl mb-8">
            <i data-lucide="layout-grid" class="text-white w-10 h-10"></i>
        </div>
        <h1 class="text-3xl font-black mb-10 tracking-tight">Demo Portal</h1>
        
        <div class="space-y-4 text-left">
            <a href="elektro/index.html" class="flex items-center justify-between p-5 bg-blue-600 hover:bg-blue-700 rounded-3xl transition-all shadow-lg group">
                <div class="flex items-center gap-4 text-white">
                    <i data-lucide="zap"></i>
                    <span class="font-bold text-lg">Elektro Van Dan</span>
                </div>
                <i data-lucide="arrow-right" class="text-white/50 group-hover:translate-x-1 transition-transform"></i>
            </a>

            <a href="startup/index.html" class="flex items-center justify-between p-5 bg-slate-50 hover:bg-slate-100 rounded-3xl border border-slate-200 transition-all group">
                <span class="font-bold text-slate-700">Startup Demo</span>
                <i data-lucide="chevron-right" class="text-slate-300 group-hover:translate-x-1 transition-transform"></i>
            </a>
            
            <a href="shop/index.html" class="flex items-center justify-between p-5 bg-slate-50 hover:bg-slate-100 rounded-3xl border border-slate-200 transition-all group">
                <span class="font-bold text-slate-700">Online Shop</span>
                <i data-lucide="chevron-right" class="text-slate-300 group-hover:translate-x-1 transition-transform"></i>
            </a>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
